  function setState(key) {
    var def = STATES[key];
    var grid = document.getElementById('stage-grid');
    var phoneWrapper = document.getElementById('phone-wrapper');
    if (def.isCompare) {
      grid.classList.add('compare-grid');
      grid.innerHTML = def.renderCompare() +
        '<div class="fwf-callouts" style="margin:24px auto 0;max-width:720px"><h4>Why this state matters</h4>' +
        def.callouts.map(function (c) {
          return '<div class="callout"><span class="label">' + c[0] + '</span>' + c[1] + '</div>';
        }).join('') + '</div>';
    } else {
      grid.classList.remove('compare-grid');
      grid.innerHTML =
        '<div class="phone" id="phone-wrapper">' +
          '<div class="phone-status"><span>9:41</span><span>● ● ●</span></div>' +
          '<div class="phone-body">' + def.render() + '</div>' +
        '</div>' +
        '<div class="fwf-callouts"><h4>Why this state matters</h4>' +
        def.callouts.map(function (c) {
          return '<div class="callout"><span class="label">' + c[0] + '</span>' + c[1] + '</div>';
        }).join('') + '</div>';
    }
    document.getElementById('stage-eyebrow').textContent = def.eyebrow;
    document.getElementById('stage-title').textContent = def.title;
    document.getElementById('stage-sub').textContent = def.sub;
    var buttons = document.querySelectorAll('.fwf-nav button');
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].classList.toggle('active', buttons[i].dataset.state === key);
    }
  }

  var navButtons = document.querySelectorAll('.fwf-nav button');
  for (var i = 0; i < navButtons.length; i++) {
    (function (btn) {
      btn.addEventListener('click', function () { setState(btn.dataset.state); });
    })(navButtons[i]);
  }
  setState('1a');
})();
